[flake8]
max-line-length = 100
exclude = .git,__pycache__,artifacts,mlruns,.github
ignore = E203, W503, D100, D104, E241, F401, W291,W293,W391,  E302, E127,E128, E231,E261,E501
per-file-ignores =
    tests/*: D

[tool:pytest]
testpaths = tests
addopts = -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*
