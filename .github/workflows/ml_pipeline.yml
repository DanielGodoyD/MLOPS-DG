# .github/workflows/ml_pipeline.yml
# CI/CD Pipeline — MLOps Picos de Intensidad
# Se activa con: push a main o pull_request a main

name: ML Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # permite ejecutar manualmente desde la UI de GitHub Actions

env:
  PYTHON_VERSION: '3.10'
  IMAGE_NAME: renovacion-prestamos-api

jobs:

  # ── JOB 1: Lint y Tests ────────────────────────────────────────────────────
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Linting con flake8
        run: |
          echo '=== Ejecutando flake8 ==='
          flake8 src/ tests/ --config=setup.cfg
          echo 'Linting OK'

      - name: Tests unitarios con pytest
        run: |
          echo '=== Ejecutando pytest ==='
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── JOB 2: Entrenar el modelo ──────────────────────────────────────────────
  train-model:
    name: Entrenar Modelo
    runs-on: ubuntu-latest
    needs: lint-and-test  # solo si el Job 1 pasó

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar dataset
        run: python src/generate_data.py

      - name: Entrenar pipeline
        run: python src/train_pipeline.py

      - name: Validar métricas (quality gate)
        run: python src/validate_model.py

      - name: Guardar artefactos del modelo
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

  # ── JOB 3: Build Docker ────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train-model  # solo si el Job 2 pasó

    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefactos del modelo
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Build de la imagen Docker
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Verificar imagen (smoke test)
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:latest python -c \
            'import pickle; m=pickle.load(open("artifacts/modelo.pkl","rb")); \
             print("Modelo OK:", type(m).__name__)'

      # Descomentar para push a Docker Hub (requiere secrets en el repo):
